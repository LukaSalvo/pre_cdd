version: "3.8"

services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=${APP_URL:-http://localhost:6875}
      - APP_KEY=${APP_KEY}
      - DB_HOST=bookstack_db
      - DB_USER=${DB_USER:-bookstack}
      - DB_USERNAME=${DB_USER:-bookstack}
      - DB_PASS=${DB_PASS:-bookstack_pass}
      - DB_PASSWORD=${DB_PASS:-bookstack_pass}
      - DB_DATABASE=${DB_DATABASE:-bookstackapp}

      # --- Authentification LDAP (Active Directory UL) ---
      - AUTH_METHOD=ldap
      - LDAP_SERVER=ldaps://montet-dc1.ad.univ-lorraine.fr:636
      - LDAP_BASE_DN=OU=Personnels,OU=_Utilisateurs,OU=UL,DC=ad,DC=univ-lorraine,DC=fr
      - LDAP_DN=${LDAP_DN}
      - LDAP_PASS=${LDAP_PASS}
      - LDAP_VERSION=3
      - LDAP_USER_FILTER=(&(objectClass=user)(sAMAccountName=$${input}))
      - LDAP_ID_ATTRIBUTE=objectGUID
      - LDAP_EMAIL_ATTRIBUTE=mail
      - LDAP_DISPLAY_NAME_ATTRIBUTE=displayName

      # --- Certificat TLS ---
      # Option B (développement) : ignorer la vérification du certificat
      - LDAP_TLS_INSECURE=${LDAP_TLS_INSECURE:-true}
      # Option A (production) : fournir le certificat CA de l'UL
      #- LDAP_TLS_CA_CERT=/config/ul-ca.crt
    volumes:
      - ./bookstack_data:/config
      # Option A : décommenter pour monter le certificat CA
      #- ./ul-ca.crt:/config/ul-ca.crt:ro
    ports:
      - "6875:80"
    restart: unless-stopped
    depends_on:
      - bookstack_db

  bookstack_db:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: bookstack_db
    environment:
      - PUID=1000
      - PGID=1000
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-secret}
      - MYSQL_DATABASE=${DB_DATABASE:-bookstackapp}
      - MYSQL_USER=${DB_USER:-bookstack}
      - MYSQL_PASSWORD=${DB_PASS:-bookstack_pass}
    volumes:
      - ./db_data:/config
    restart: unless-stopped
